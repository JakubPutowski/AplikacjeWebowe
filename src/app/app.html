<div class="container" style="padding: 20px; max-width: 600px; margin: auto">
  <h1 class="header-center">ManageMe 🚀</h1>

  <mat-card style="padding: 20px; margin-bottom: 20px">
    <div style="display: flex; flex-direction: column; gap: 10px">
      <mat-form-field appearance="outline" color="primary">
        <mat-label>Nazwa projektu</mat-label>
        <input matInput [(ngModel)]="projectName" />
      </mat-form-field>

      <mat-form-field appearance="outline" color="primary">
        <mat-label>Opis</mat-label>
        <textarea matInput [(ngModel)]="projectDesc"></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="addProject()">Dodaj Projekt</button>
    </div>
  </mat-card>

  <div style="display: flex; flex-direction: column; gap: 12px">
    @for (item of projects(); track item.id) {
      <mat-card
        style="padding: 15px; display: flex; justify-content: space-between; align-items: center"
      >
        <div>
          <strong style="font-size: 1.2em; color: #4a148c">{{ item.name }}</strong>
          <p style="margin: 5px 0 0 0; color: #666">{{ item.description }}</p>
        </div>
        <button mat-icon-button color="warn" (click)="deleteProject(item.id)">
          <mat-icon>delete_sweep</mat-icon>
        </button>
      </mat-card>
    } @empty {
      <p style="text-align: center; color: #9c27b0; font-style: italic">
        Lista jest pusta. Czas coś zaplanować!
      </p>
    }
  </div>
</div>
